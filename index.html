<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌴 万宁之旅 | 4天3晚海岛漫游</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            /* 梦幻椰林海岛渐变：深椰林绿 → 海洋蓝绿 → 天空蓝 */
            background: linear-gradient(180deg, 
                #0d5c48 0%, 
                #1a7a5e 15%, 
                #2e8b7a 30%, 
                #20b2aa 50%, 
                #48d1cc 70%, 
                #87ceeb 100%);
            min-height: 100vh;
            padding-bottom: 40px;
            position: relative;
        }

        /* 椰林装饰图案 */
        body::before {
            content: '🌴';
            position: fixed;
            font-size: 120px;
            opacity: 0.08;
            top: 10%;
            right: -30px;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '🥥';
            position: fixed;
            font-size: 80px;
            opacity: 0.06;
            bottom: 20%;
            left: -20px;
            transform: rotate(15deg);
            pointer-events: none;
            z-index: 0;
        }

        /* Header - 毛玻璃效果 */
        .header {
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.15) 0%, 
                rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 10;
        }

        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 15px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .header .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            font-weight: 400;
        }

        /* 日期标签 - 毛玻璃 */
        .date-tabs {
            display: flex;
            overflow-x: auto;
            padding: 20px 15px;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: relative;
            z-index: 10;
        }

        .date-tabs::-webkit-scrollbar {
            display: none;
        }

        .date-tab {
            flex-shrink: 0;
            padding: 14px 22px;
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.12) 0%, 
                rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            line-height: 1.4;
        }

        .date-tab:hover {
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.2) 0%, 
                rgba(255,255,255,0.1) 100%);
            transform: translateY(-2px);
        }

        .date-tab.active {
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.9) 0%, 
                rgba(255,255,255,0.8) 100%);
            color: #0d5c48;
            font-weight: 600;
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* 时间轴 */
        .timeline {
            padding: 10px 20px 30px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .timeline-item {
            display: flex;
            margin-bottom: 24px;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time-marker {
            flex-shrink: 0;
            width: 65px;
            text-align: right;
            padding-right: 15px;
        }

        .time-marker .time {
            color: white;
            font-size: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.25) 0%, 
                rgba(255,255,255,0.15) 100%);
            backdrop-filter: blur(10px);
            padding: 5px 10px;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        .timeline-line {
            flex-shrink: 0;
            width: 2px;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.6) 0%, 
                rgba(255,255,255,0.3) 100%);
            position: relative;
            margin: 0 12px;
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #f4e4c1, #e8d5b5);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
        }

        /* 内容卡片 - 毛玻璃效果 */
        .content-card {
            flex: 1;
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.9) 0%, 
                rgba(255,255,255,0.85) 100%);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 50px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .activity-title {
            font-size: 15px;
            font-weight: 700;
            color: #1a3a2f;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        /* 车程信息 - 海岛风 */
        .drive-info {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, #20b2aa, #48d1cc);
            color: white;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 15px;
            margin-bottom: 12px;
            box-shadow: 0 3px 10px rgba(32,178,170,0.3);
        }

        /* 备注 */
        .note {
            font-size: 13px;
            color: #4a6355;
            line-height: 1.7;
            padding-top: 12px;
            border-top: 1px dashed rgba(13,92,72,0.2);
        }

        .note::before {
            content: '💡 ';
        }

        /* 分类标签 - 海岛配色 */
        .tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            margin-right: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-flight { 
            background: linear-gradient(135deg, #e3f2fd, #bbdefb); 
            color: #1565c0; 
        }
        .tag-drive { 
            background: linear-gradient(135deg, #fff3e0, #ffe0b2); 
            color: #e65100; 
        }
        .tag-food { 
            background: linear-gradient(135deg, #fce4ec, #f8bbd9); 
            color: #c2185b; 
        }
        .tag-hotel { 
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9); 
            color: #2e7d32; 
        }
        .tag-activity { 
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2); 
            color: #00838f; 
        }
        .tag-beach { 
            background: linear-gradient(135deg, #fff8e1, #ffecb3); 
            color: #f57f17; 
        }
        .tag-massage { 
            background: linear-gradient(135deg, #f3e5f5, #e1bee7); 
            color: #7b1fa2; 
        }
        .tag-night { 
            background: linear-gradient(135deg, #1a237e, #283593); 
            color: #fff; 
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            position: relative;
            z-index: 10;
        }

        .footer-icons {
            font-size: 20px;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        /* 浮动装饰 */
        .float-decor {
            position: fixed;
            font-size: 40px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        .float-decor:nth-child(1) { top: 30%; left: 5%; animation-delay: 0s; }
        .float-decor:nth-child(2) { top: 50%; right: 5%; animation-delay: 2s; }
        .float-decor:nth-child(3) { bottom: 30%; left: 8%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* 响应式 */
        @media (max-width: 400px) {
            .header h1 { font-size: 26px; }
            .header .subtitle { font-size: 13px; }
            .time-marker { width: 55px; padding-right: 10px; }
            .time-marker .time { font-size: 11px; padding: 4px 8px; }
            .content-card { padding: 14px; }
            .activity-title { font-size: 14px; }
            .date-tab { padding: 12px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <!-- 浮动装饰 -->
    <div class="float-decor">🌊</div>
    <div class="float-decor">🏝️</div>
    <div class="float-decor">🐚</div>

    <div class="header">
        <div class="header-badge">🏝️ 海南·万宁</div>
        <h1>🌴 万宁之旅</h1>
        <div class="subtitle">4天3晚 · 椰林海岛漫游计划</div>
    </div>

    <div class="date-tabs" id="dateTabs">
        <div class="date-tab active" data-day="day1">📅 6月19日<br><small>周五</small></div>
        <div class="date-tab" data-day="day2">📅 6月20日<br><small>周六</small></div>
        <div class="date-tab" data-day="day3">📅 6月21日<br><small>周日</small></div>
        <div class="date-tab" data-day="day4">📅 6月22日<br><small>周一</small></div>
    </div>

    <div class="timeline" id="timeline">
        <!-- 行程内容将通过 JS 动态生成 -->
    </div>

    <div class="footer">
        <div class="footer-icons">🌴🌊☀️🥥🏄</div>
        用心规划每一刻 · 万宁等你来
    </div>

    <script>
        // 行程数据
        const tripData = [
            {
                day: "day1",
                date: "6月19日",
                weekday: "周五",
                items: [
                    { time: "10:10", activity: "✈️ 抵达三亚凤凰机场T3", drive: "", note: "T3航站楼出门右转，地面停车场提车；建议提前在神州租车下单", tag: "tag-flight" },
                    { time: "10:30", activity: "🚗 取车+出发", drive: "", note: "（等取车约20分钟）", tag: "tag-drive" },
                    { time: "10:30", activity: "🚗 自驾前往石梅湾", drive: "约1.5小时", note: "走环岛高速G98，途经亚龙湾、海棠湾，全程高速注意限速100km/h", tag: "tag-drive" },
                    { time: "12:00", activity: "🍽️ 沿途午餐（琼海市区）", drive: "", note: "推荐嘉积鸭（白切蘸酱）、潭门海鲜（码头现买现做便宜又新鲜）；（用餐约1.5小时）", tag: "tag-food" },
                    { time: "13:30", activity: "🚗 琼海→石梅湾HelloVilla", drive: "约1.5小时", note: "午餐后出发前往石梅湾HelloVilla", tag: "tag-drive" },
                    { time: "14:00", activity: "🏨 入住HelloVilla你好私舍", drive: "约10分钟", note: "石梅湾私享海滩，人少安静；65㎡家庭套房，两晚连住6/19-6/21", tag: "tag-hotel" },
                    { time: "16:00", activity: "🚗 石梅湾→日月湾", drive: "约20分钟", note: "导航至日月湾，海边路边可免费停车", tag: "tag-drive" },
                    { time: "16:20-18:00", activity: "🏖️ 日月湾海滩+日落", drive: "", note: "海南最热门冲浪湾区；日落约18:55，在沙滩看完日落再离开；沙滩拍照光线最佳", tag: "tag-beach" },
                    { time: "18:40", activity: "🚗 日月湾→216餐吧", drive: "约10分钟", note: "从海滩开车约10分钟，正好赶上216的日落篝火氛围", tag: "tag-drive" },
                    { time: "18:40", activity: "🍹 216沙滩餐酒吧晚餐", drive: "", note: "日月湾标志性打卡地，沙滩篝火、东南亚风情；必点椰子水、烤海鲜、啤酒；（用餐约1.5小时）", tag: "tag-food" },
                    { time: "19:15", activity: "🚗 216→石梅湾HelloVilla", drive: "约20分钟", note: "晚餐后返回Villa休息", tag: "tag-drive" }
                ]
            },
            {
                day: "day2",
                date: "6月20日",
                weekday: "周六",
                items: [
                    { time: "09:00", activity: "🚗 石梅湾→洲仔岛码头", drive: "约40分钟", note: "导航至洲仔岛码头，码头有停车场（收费）；提前1天在点评预约出海", tag: "tag-drive" },
                    { time: "09:40", activity: "🚤 乘船上洲仔岛", drive: "", note: "（乘船约40分钟，玻璃海，桨板+浮潜一起玩；防晒SPF50+必须）", tag: "tag-activity" },
                    { time: "09:40-12:00", activity: "🛶 洲仔岛桨板+浮潜", drive: "", note: "水质清澈见底，玻璃海超美；浮潜可见珊瑚、鱼群、海胆", tag: "tag-activity" },
                    { time: "12:00", activity: "🍽️ 午餐（岛上简餐）", drive: "", note: "岛上渔家乐，现捕海鲜加工；推荐香煎马鲛鱼、蒜蓉鲍鱼、椰子饭；（用餐约40分钟）", tag: "tag-food" },
                    { time: "13:40", activity: "🚤 乘船返回码头", drive: "", note: "（乘船返回洲仔岛码头）", tag: "tag-activity" },
                    { time: "13:40", activity: "🚗 洲仔岛码头→日月湾", drive: "约20分钟", note: "开车前往日月湾继续冲浪", tag: "tag-drive" },
                    { time: "14:00-16:30", activity: "🏄 冲浪体验（日月湾）", drive: "", note: "新手推荐日月湾冲浪俱乐部，请教练200元/小时含板；日落前浪最稳", tag: "tag-activity" },
                    { time: "17:10", activity: "🚗 日月湾→神州半岛", drive: "约20分钟", note: "前往泰式按摩", tag: "tag-drive" },
                    { time: "17:30-19:00", activity: "💆 泰六THAILUX泰式按摩", drive: "", note: "神州半岛泰式按摩老店，手法正宗；推荐泰式草球热敷、芳香精油按摩；约200-300元/人", tag: "tag-massage" },
                    { time: "19:15", activity: "🚗 按摩店→石梅湾", drive: "约15分钟", note: "按摩完直接回石梅湾", tag: "tag-drive" },
                    { time: "19:30", activity: "🍲 嗲嗲的椰子鸡（石梅湾店）", drive: "", note: "明星同款！椰子水现倒做锅底，文昌鸡嫩滑；必点椰子鸡、野生马齿苋、手打牛肉丸（人均约100元）", tag: "tag-food" }
                ]
            },
            {
                day: "day3",
                date: "6月21日",
                weekday: "周日",
                items: [
                    { time: "10:00", activity: "🏨 退房出发神州半岛", drive: "", note: "多睡会，慢悠悠出发", tag: "tag-hotel" },
                    { time: "10:30-12:00", activity: "🛤️ 椰林公路walk+山钦湾", drive: "", note: "环岛旅游公路万宁段，椰林夹道超美；山钦湾小众秘境，黑礁石+燕子洞拍照超出片；注意礁石湿滑；建议先玩山钦湾再走椰林公路反方向", tag: "tag-activity" },
                    { time: "12:00", activity: "🚗 山钦湾→神州半岛午餐", drive: "约10分钟", note: "导航至神州半岛附近农家乐", tag: "tag-drive" },
                    { time: "12:30", activity: "🍽️ 午餐（神州半岛附近）", drive: "", note: "推荐农家乐：东澳鹅（白切）、和乐蟹（清蒸）、港北对虾；认准本地人去的店；（用餐约1.5小时）", tag: "tag-food" },
                    { time: "15:30", activity: "🚗 神州半岛→海口", drive: "约2.5小时", note: "环岛高速G98直达，海口方向车少好开", tag: "tag-drive" },
                    { time: "18:00", activity: "🏨 入住海口海知家公寓", drive: "约10分钟", note: "美兰机场店，距机场约10分钟车程，方便次日赶早班机", tag: "tag-hotel" },
                    { time: "19:20", activity: "🚗 酒店→骑楼老街", drive: "约10分钟", note: "傍晚出发，夜游骑楼", tag: "tag-drive" },
                    { time: "19:30", activity: "🏛️ 骑楼老街夜游", drive: "", note: "海口历史地标，南洋风格骑楼建筑；晚上灯光亮起更出片；必吃：甄大姑陵水酸粉、吴日彪蒜香排骨；夜游约1.5小时", tag: "tag-night" },
                    { time: "21:00", activity: "🚗 骑楼老街→海大南门夜市", drive: "约10分钟", note: "前往海大南门小吃街", tag: "tag-drive" },
                    { time: "21:00", activity: "🍢 海大南门夜市", drive: "", note: "海南大学南门小吃街，网红夜市；必吃：清补凉（椰奶/糖水）、陵水酸粉、糟粕醋、烤生蚝；约1小时", tag: "tag-night" },
                    { time: "22:00", activity: "🚗 夜市→海口酒店", drive: "约10分钟", note: "返回酒店休息", tag: "tag-drive" }
                ]
            },
            {
                day: "day4",
                date: "6月22日",
                weekday: "周一",
                items: [
                    { time: "06:30", activity: "🏨 起床退房", drive: "", note: "退房前检查证件、充电宝、行李；提前确认航班动态", tag: "tag-hotel" },
                    { time: "06:40", activity: "🚗 酒店→海口美兰机场", drive: "约10分钟", note: "美兰机场距公寓很近，导航至T2航站楼；提前1.5小时到机场", tag: "tag-drive" },
                    { time: "08:25", activity: "✈️ CZ3515返程上海浦东", drive: "", note: "T2出发，实际到达约11:25；落地后可在机场取车或乘地铁", tag: "tag-flight" }
                ]
            }
        ];

        // 渲染时间轴
        function renderTimeline(day) {
            const timeline = document.getElementById('timeline');
            const dayData = tripData.find(d => d.day === day);
            
            if (!dayData) return;

            let html = '';
            dayData.items.forEach((item, index) => {
                const driveHtml = item.drive ? `<div class="drive-info">🚗 ${item.drive}</div>` : '';
                html += `
                    <div class="timeline-item" style="animation-delay: ${index * 0.05}s">
                        <div class="time-marker">
                            <span class="time">${item.time}</span>
                        </div>
                        <div class="timeline-line"></div>
                        <div class="content-card">
                            <div class="activity-title">
                                <span class="tag ${item.tag}">${getTagName(item.tag)}</span>
                                ${item.activity}
                            </div>
                            ${driveHtml}
                            <div class="note">${item.note}</div>
                        </div>
                    </div>
                `;
            });

            timeline.innerHTML = html;
        }

        function getTagName(tag) {
            const tagNames = {
                'tag-flight': '航班',
                'tag-drive': '车程',
                'tag-food': '美食',
                'tag-hotel': '住宿',
                'tag-activity': '活动',
                'tag-beach': '海滩',
                'tag-massage': '按摩',
                'tag-night': '夜游'
            };
            return tagNames[tag] || '';
        }

        // 切换日期
        document.getElementById('dateTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.date-tab');
            if (!tab) return;

            document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            renderTimeline(tab.dataset.day);
        });

        // 初始化
        renderTimeline('day1');
    </script>
</body>
</html>
